# 실제 테스트용 패킷 1건 — Senior Shield.
# 대상: GUARDED -> INTERRUPT TTL 만료 시 상태 하강 정책

decision_key: SS-TTL-EXPIRY-POLICY
packet_version: 1
supersedes_run_id: null

domain: senior_shield
change_type: state_machine_rule
decision_required: "GUARDED 상태의 TTL 만료 시 INTERRUPT 로 승격할지, SAFE 로 하강할지 결정"

context: |
  RiskSession 이 GUARDED 에 들어가면 TRIGGER 신호 없이도 일정 시간(TTL) 유지된다.
  현재 구현은 TTL 만료 시 SAFE 로 하강한다. 그러나 반복 호출 패턴이 TTL 근처에서
  끊기는 경우, 바로 SAFE 로 가면 "안전 확인했어요" 토스트와 duplicate guardian
  action 경로가 겹칠 위험이 보고됐다. 한편 INTERRUPT 로 승격하면 false positive
  fatigue 가 증가한다.

current_proposal: |
  TTL 만료 시 기본 하강을 유지하되, 만료 직전 60초 이내에 PASSIVE 신호가 1건
  이상 있었으면 GUARDED 를 1회 연장하고, 그 후에도 TRIGGER 가 없으면 SAFE 로
  하강한다. INTERRUPT 승격은 하지 않는다.

alternatives:
  - id: ALT-1
    description: "TTL 만료 시 무조건 INTERRUPT 승격 (false positive fatigue 우려)"
  - id: ALT-2
    description: "TTL 만료 시 즉시 SAFE 하강, 연장 없음 (duplicate action 우려)"
  - id: ALT-3
    description: "PASSIVE 신호가 있으면 GUARDED 유지만 하고, TTL 타이머 자체를 재시작하지 않음"

invariants:
  - "call-derived signal snooze 상태에서는 같은 통화 내 상태 전이가 금지된다"
  - "TRIGGER 없는 상태에서 팝업은 발화되지 않는다 (PASSIVE-only 는 토스트만)"
  - "duplicate guardian action 이 발생해서는 안 된다"
  - "RiskLevel 과 AlertState 는 서로 다른 축이며, 자동 매핑하지 않는다"

non_goals:
  - "TRIGGER 신호 처리 경로 변경"
  - "팝업 발화 규칙 변경"
  - "은행 ARS 탐지 로직 수정"

risks_if_wrong:
  - "TTL 만료 타이밍과 반복 호출 패턴이 겹쳐 실제 피싱 세션을 놓칠 수 있음"
  - "보호자 행동 경로가 두 번 트리거되어 사용자 혼란"
  - "시니어 피로도 증가로 다음 진짜 경고를 무시"

evaluation_criteria:
  - false_positive_fatigue
  - false_negative_risk
  - duplicate_action_risk
  - state_consistency
  - explainability

severity_guide:
  critical: "invariants 위반, safety/policy/canon break"
  high:     "핵심 로직 수정 필요, false negative 증가, duplicate action 가능성"
  medium:   "보완 권장이나 현안도 동작 가능"
  low:      "스타일/표현/선호 수준"

review_questions:
  - "call-derived signal snooze와 app-derived signal 유지가 충돌하는가?"
  - "TTL 만료 후 상태 하강이 duplicate guardian action을 유발하는가?"
  - "실제 보이스피싱 시나리오에서 false negative가 증가하는가?"
  - "오탐 상황에서 senior fatigue를 과도하게 늘리는가?"
  - "기존 cooldown semantics가 깨지는 경로가 있는가?"

required_output:
  format: json
  fields:
    - reviewer
    - reviewer_mode
    - review_status
    - verdict
    - confidence
    - agreement_points
    - objections
    - edge_cases
    - recommended_option
    - requires_human_decision
    - blocking_questions
